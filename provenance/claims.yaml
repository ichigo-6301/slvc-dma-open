kind: claims
schema_version: 1.0.0
claims:
  - id: slvc_dma_rx_payload_cdc_regression
    profile: slvc_dma_v1_512_rx_payload_cdc_development
    statement: The same-clock 512, async64, and async512 RX memory profiles passed their configured regression sets on Windows ModelSim and Linux Questa.
    metric: directed_regression
    value: pass
    unit: result
    benchmark: "default 14 markers, same-clock 12 markers, async64 14 markers from 13 commands, async512 14 markers from 13 commands"
    configuration: Committed-frame RX source with optional dedicated RX memory backend
    source_ref: e97728092b5814d65338e254c8c46af57612bff6
    tool: ModelSim SE-64 2020.4 / Questa Sim-64 10.7c
    evidence:
      - slvc_dma_rx_payload_cdc_regression_summary
    status: verified
    caveat: Directed and deterministic random simulation is not coverage closure, formal proof, or board validation.
    public: true
  - id: slvc_dma_rx_payload_cdc_ideal_throughput
    profile: slvc_dma_v1_512_rx_payload_cdc_development
    statement: Ideal-memory tests sustained one AXI W beat per mem_clk for async64 and async512.
    metric: ideal_model_interface_throughput
    value: 100
    unit: percent W-channel utilization
    benchmark: 1 MiB transfer with ready memory model
    configuration: "async64 8 byte/cycle; async512 64 byte/cycle; four peak outstanding"
    source_ref: e97728092b5814d65338e254c8c46af57612bff6
    tool: ModelSim SE-64 2020.4 / Questa Sim-64 10.7c
    evidence:
      - slvc_dma_rx_payload_cdc_regression_summary
    status: verified
    caveat: This is RTL/model interface throughput, not a board DDR or lossless-network measurement.
    public: true
  - id: slvc_dma_rx_payload_cdc_fpga_ooc_200m
    profile: slvc_dma_v1_512_rx_payload_cdc_development
    statement: Same-clock 512, async64, and async512 RX memory profiles met routed 200 MHz setup and hold timing on xc7z100ffg900-2.
    metric: fpga_ooc_timing
    value: 0.028
    unit: ns minimum WNS
    benchmark: Vivado OOC synth, opt, place, phys-opt, and route
    configuration: "5.000 ns aclk/mem_clk; three routed strategies per profile; point-to-point non-Gray CDC exceptions; explicit Gray max-delay and bus-skew constraints"
    source_ref: 971feb4283d3c76556e737d2e8ec96f36e700a34
    tool: Vivado 2018.3
    evidence:
      - slvc_dma_rx_payload_cdc_fpga_ooc_summary
    status: verified
    caveat: OOC timing is not board timing or complete CDC/RDC signoff; documented OOC BRAM/reset and async64 synchronizer-placement warnings remain.
    public: true
  - id: slvc_dma_rx_payload_cdc_same_clock_bypass
    profile: slvc_dma_v1_512_rx_same_clock_512
    statement: The same-clock 512 synthesized netlist contains no RX payload CDC bridge, FIFO, or reset synchronizer cells.
    metric: unexpected_rx_payload_cdc_cell_count
    value: 0
    unit: cells
    benchmark: post-synthesis hierarchical cell audit
    configuration: DMA_RX_WIDE_PAYLOAD_PROFILE without asynchronous profile macros
    source_ref: e97728092b5814d65338e254c8c46af57612bff6
    tool: Vivado 2018.3
    evidence:
      - slvc_dma_rx_payload_cdc_fpga_ooc_summary
    status: verified
    caveat: This claim applies only to the optional same-clock RX payload path, not other carrier CDC blocks in the source set.
    public: true
  - id: slvc_dma_rx_payload_cdc_dc_ooc_200m
    profile: slvc_dma_v1_512_rx_payload_cdc_development
    statement: Async64 and async512 RX payload CDC boundaries met 5.000 ns source and memory clock setup timing in Design Compiler OOC synthesis.
    metric: asic_frontend_ooc_timing
    value: 1.39268
    unit: ns minimum setup WNS
    benchmark: dual-clock bridge, FIFO control/storage model, serializer or writer, and completion return
    configuration: "5.000 ns source/memory clocks, asynchronous groups, generic RTL FIFO arrays"
    source_ref: 338b392be748a62bb6a5ce8037822b6112318245
    tool: Design Compiler O-2018.06-SP1
    evidence:
      - slvc_dma_rx_payload_cdc_dc_ooc_summary
    status: verified
    caveat: Frontend OOC synthesis with generic arrays is not macro-backed area, physical implementation, extracted STA, or signoff.
    public: true
  - id: slvc_dma_rx_payload_cdc_contract
    profile: slvc_dma_v1_512_rx_payload_cdc_development
    statement: RX memory CDC crosses command, 512-bit payload, and tagged completion while keeping AXI AW/W/B in mem_clk and using bounded soft-reset quiesce, drain, and memory-domain acknowledgement.
    metric: structural_cdc_contract
    value: verified
    unit: result
    benchmark: RTL structure, protocol assertions, regression, directional CDC reports, and bus-skew reports
    configuration: single in-flight frame with 8-bit transaction tag
    source_ref: 971feb4283d3c76556e737d2e8ec96f36e700a34
    tool: RTL inspection / ModelSim / Questa / Vivado 2018.3
    evidence:
      - slvc_dma_rx_payload_cdc_contract
      - slvc_dma_rx_payload_cdc_regression_summary
      - slvc_dma_rx_payload_cdc_fpga_ooc_summary
    status: verified
    caveat: Arbitrary one-sided reset recovery, permanent downstream stalls, multiple out-of-order frames, and complete ASIC CDC/RDC signoff are not claimed.
    public: true
  - id: slvc_dma_rtl_comment_only_equivalence
    profile: slvc_dma_v1_512_udp_ipv4_adapter_p0
    statement: The Chinese-comment RTL source has zero functional Verilog token differences from the prior function baseline.
    metric: functional_token_delta
    value: 0
    unit: tokens
    benchmark: lexical comparison of all RTL sources after removing ordinary comments and whitespace
    configuration: "base be71e166 to commented source 709e1c1, with the 40-file public RTL allowlist included"
    source_ref: 709e1c102af3cc8a195bae5dc126bd2c3cf23eb7
    tool: Python 3 Verilog lexer checker
    evidence:
      - slvc_dma_rtl_comment_only_equivalence
    status: verified
    caveat: "This proves comments-only source equivalence; it is not a new functional, performance, coverage, or signoff result."
    public: true
  - id: slvc_dma_udp_adapter_core_selected_rtl_regression
    profile: slvc_dma_v1_512_udp_ipv4_adapter_p0
    statement: The frozen 512-bit SLVC DMA core selected regression remains verified and the adapter source commit does not modify the core RTL.
    metric: directed_regression
    value: pass
    unit: result
    benchmark: "ten core ModelSim directed tests covering TX/RX control, parser, frame pool, descriptor, CQ credit, and write prefetch behavior"
    configuration: Frozen 512-bit SLVC core beneath the optional UDP IPv4 adapter
    source_ref: 31e1d77f480d12af1e8ee436034c6c4a646b409c
    tool: ModelSim SE-64 2020.4 / Questa Sim-64 10.7c
    evidence:
      - slvc_dma_v1_regression_summary
    status: verified
    caveat: This is inherited fixed-commit core evidence; the four adapter tests are claimed separately and directed testing is not coverage closure.
    public: true
  - id: slvc_dma_udp_adapter_core_fpga_ooc_200m
    profile: slvc_dma_v1_512_udp_ipv4_adapter_p0
    statement: The unchanged complete 512-bit frame_dma_wrapper met routed 200 MHz setup and hold timing with three Vivado implementation strategies.
    metric: fpga_ooc_timing
    value: 0.162
    unit: ns minimum WNS
    benchmark: "Vivado OOC synth, opt, place, phys-opt, and route"
    configuration: "xc7z100ffg900-2, 5.000 ns aclk and tx_axis_aclk, Explore/Performance_Explore/ExtraNetDelay_high"
    source_ref: 35835370ef2fd733844f507292f09f9dcbcffd01
    tool: Vivado 2018.3
    evidence:
      - slvc_dma_v1_ooc_200m_summary
    status: verified
    caveat: The optional adapter is outside frame_dma_wrapper and is not included in this FPGA result; OOC timing is not board-level timing.
    public: true
  - id: slvc_dma_udp_adapter_core_fpga_ooc_resources
    profile: slvc_dma_v1_512_udp_ipv4_adapter_p0
    statement: "The unchanged core routed OOC resource use was 38,074-38,088 LUTs, 40,785-40,787 registers, 44 RAMB36, 3 RAMB18, and 0 DSPs."
    metric: fpga_resources
    value: 38088
    unit: LUT maximum
    benchmark: Vivado routed utilization reports
    configuration: "xc7z100ffg900-2, frozen 512-bit frame_dma_wrapper, 5.000 ns clock"
    source_ref: 35835370ef2fd733844f507292f09f9dcbcffd01
    tool: Vivado 2018.3
    evidence:
      - slvc_dma_v1_ooc_200m_summary
    status: verified
    caveat: The optional adapter is not included in these core FPGA resource values and has no release-bound FPGA implementation claim yet.
    public: true
  - id: slvc_dma_udp_adapter_core_writer_throughput
    profile: slvc_dma_v1_512_udp_ipv4_adapter_p0
    statement: The unchanged core writer-prefetch smoke observed contiguous AXI W runs up to 48 beats without W-channel backpressure.
    metric: stream_throughput
    value: 48
    unit: contiguous 512-bit AXI W beats
    benchmark: E20A23 W prefetch FIFO directed test
    configuration: "Frozen 512-bit core writer, long multi-burst payload case"
    source_ref: 31e1d77f480d12af1e8ee436034c6c4a646b409c
    tool: ModelSim SE-64 2020.4 / Questa Sim-64 10.7c
    evidence:
      - slvc_dma_v1_regression_summary
    status: verified
    caveat: "This is a core data-stage observation, not adapter-to-memory end-to-end or lossless UDP throughput."
    public: true
  - id: slvc_dma_udp_adapter_directed_regression
    profile: slvc_dma_v1_512_udp_ipv4_adapter_p0
    statement: Four UDP IPv4 adapter directed regressions passed on Windows ModelSim and IC_EDA Questa at the adapter source commit.
    metric: directed_regression
    value: pass
    unit: result
    benchmark: "directed boundary/parser compatibility, deterministic random, error/reset/stall matrix, and two-channel adapter-to-DMA smoke"
    configuration: "512-bit Ethernet II IPv4 UDP input, fixed IHL 5 profile, 512-bit SHDR64 output, maximum payload 4096 bytes"
    source_ref: 709e1c102af3cc8a195bae5dc126bd2c3cf23eb7
    tool: ModelSim SE-64 2020.4 / Questa Sim-64 10.7c
    evidence:
      - slvc_dma_udp_adapter_regression_summary
    status: verified
    caveat: "The tests are directed and deterministic stress tests, not coverage closure, formal proof, or board-level Ethernet validation."
    public: true
  - id: slvc_dma_udp_adapter_dc_ooc_200m
    profile: slvc_dma_v1_512_udp_ipv4_adapter_p0
    statement: The adapter-only Design Compiler run met a 5.000 ns clock with +0.39 ns WNS and zero setup TNS in a 55 nm TT standard-cell library.
    metric: asic_ooc_timing
    value: 0.39
    unit: ns WNS
    benchmark: Design Compiler compile_ultra adapter-only OOC
    configuration: "5.000 ns clock, 0.200 ns setup uncertainty, 0.050 ns hold uncertainty, 0.500 ns I/O delays"
    source_ref: abe35e682f44d2f89e381f7d93b917567dad6afa
    tool: Design Compiler O-2018.06-SP1
    evidence:
      - slvc_dma_udp_adapter_dc_ooc_summary
    status: verified
    caveat: "This is frontend synthesis of the adapter alone, not full-DMA synthesis, physical design, extracted STA, or signoff."
    public: true
  - id: slvc_dma_udp_adapter_dc_area
    profile: slvc_dma_v1_512_udp_ipv4_adapter_p0
    statement: "Adapter-only mapped area was 11744.32 library area units with 3746 leaf cells, 909 registers, and zero latches."
    metric: asic_ooc_area
    value: 11744.32
    unit: library area units
    benchmark: Design Compiler compile_ultra adapter-only OOC
    configuration: "55 nm TT standard-cell library, packet memory absent, no SRAM macro"
    source_ref: abe35e682f44d2f89e381f7d93b917567dad6afa
    tool: Design Compiler O-2018.06-SP1
    evidence:
      - slvc_dma_udp_adapter_dc_ooc_summary
    status: verified
    caveat: Library area units are technology-specific and are not a full-DMA area estimate; power is likewise a pre-layout estimate.
    public: true
